<!DOCTYPE html>
<html>
<head>
    <title>Assignment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<h1 class="text-center">Assignment</h1>

<div class="container">
    
    <div class="row justify-content-center mt-3">
        <div class="col-3">
            <input
                type="text"
                id="string_1"
                class="form-control"
                placeholder="input 1"
            />
        </div>

        <div class="col-3">
            <input
                type="text"
                id="string_2"
                class="form-control"
                placeholder="input 2"
            />
        </div>
    </div>

    <div class="row justify-content-center mt-3">
        <button type="button" class="btn btn-primary col-2" id="check_button">
            Check
        </button>
    </div>

    <div class="row text-center mt-4">
        <span id="result">Result</span>
    </div>

</div>

<script>
    document.getElementById("check_button").addEventListener("click", function() {
        let str1 = document.getElementById("string_1").value;
        let str2 = document.getElementById("string_2").value;

        // Compare strings
        let isEqual = (str1 === str2);

        document.getElementById("result").innerText = "Result: " + isEqual;
    });
</script>

</body>
</html>
